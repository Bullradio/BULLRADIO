<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BULL RADIO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    font-family:'Poppins',sans-serif;
    color:white;
    overflow:hidden;
}

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#ff003c 0%,transparent 40%),
    radial-gradient(circle at bottom,#0044ff 0%,transparent 40%),
    #0f0f0f;
    animation:bgmove 8s infinite alternate;
}

@keyframes bgmove{
    from{
        filter:hue-rotate(0deg);
    }
    to{
        filter:hue-rotate(40deg);
    }
}

.container{
    position:fixed;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100%;
    width:100%;
    padding:20px;
    text-align:center;
    overflow:hidden;
}
.logo{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:25px;
    box-shadow:0 0 25px rgba(255,255,255,0.25);
    opacity:0.75;
}

h1{
    margin-top:15px;
    font-size:32px;
    font-weight:600;
}

.subtitle{
    margin-top:8px;
    opacity:0.8;
    font-size:16px;
}

.socialname{
    margin-top:10px;
    font-size:12px;
    opacity:0.7;
    background:rgba(255,255,255,0.08);
    padding:7px 13px;
    border-radius:12px;
}

.player{
    margin-top:25px;
}

.play-btn{
    width:82px;
    height:82px;
    border:none;
    border-radius:50%;
    background:#ff003c;
    color:white;
    font-size:20px;
    font-weight:600;
    box-shadow:0 0 20px rgba(255,0,60,0.5);
}

.play-btn:active{
    transform:scale(0.95);
}

.status{
    margin-top:14px;
    font-size:15px;
    opacity:0.8;
}

.visualizer{
    display:flex;
    gap:6px;
    margin-top:20px;
    height:40px;
    align-items:flex-end;
}
.bar{
    width:8px;
    background:white;
    border-radius:10px;
    animation:bounce 1s infinite ease-in-out;
}
.bar:nth-child(2){animation-delay:0.1s;}
.bar:nth-child(3){animation-delay:0.2s;}
.bar:nth-child(4){animation-delay:0.3s;}
.bar:nth-child(5){animation-delay:0.4s;}
@keyframes bounce{
    0%,100%{
        height:5px;
        opacity:0.3;
    }
    50%{
        height:40px;
        opacity:1;
    }
}
.social{
    margin-top:20px;
}

.social a{
    text-decoration:none;
    color:white;
    background:#1f1f1f;
    padding:11px 17px;
    border-radius:12px;
    font-size:13px;
}

.listeners{
    position:absolute;
    bottom:40px;
    font-size:9px;
    opacity:0.48;
    letter-spacing:1px;
}

.footer{
    position:absolute;
    bottom:18px;
    font-size:12px;
    opacity:0.5;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<img src="logo24.png" class="logo">

<h1>BULL RADIO</h1>

<div class="subtitle">
LA RADIO SEMPRE IN LINEA
</div>

<div class="socialname">
WWW.BULLRADIO.NET
</div>

<div class="player">

<button class="play-btn" onclick="toggleRadio()" id="playBtn">
PLAY
</button>

<div class="status" id="status">
Premi PLAY
</div>

</div>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>
<div class="listeners">
ONLINE: <span id="listenerCount">...</span>
</div>
<div class="social">

<a href="https://www.facebook.com/Thebull.italia/" target="_blank">
Facebook
</a>

</div>



<div class="footer">
Created by Secchi Mauro
</div>

<audio id="radio" preload="none">

<source src="http://sr10.inmystream.it:8227/stream" type="audio/mpeg">

</audio>

</div>

<script>

const radio = document.getElementById("radio");
const playBtn = document.getElementById("playBtn");
const statusText = document.getElementById("status");

let isPlaying = false;

function toggleRadio(){

    if(!isPlaying){
        audioContext.resume();

        radio.play().then(() => {

            playBtn.innerHTML = "STOP";
            statusText.innerHTML = "Online";

            isPlaying = true;

        }).catch(function(){

            statusText.innerHTML = "Errore Stream";

        });

    }else{

        radio.pause();

playBtn.innerHTML = "PLAY";
statusText.innerHTML = "Premi PLAY";

isPlaying = false;
    }
}

radio.onplaying = function(){
    statusText.innerHTML = "Online";
}
radio.onerror = function(){
    isPlaying = false;
    playBtn.innerHTML = "PLAY";
    statusText.innerHTML = "Riconnessione...";
    tentaRiconnessione();
}

function tentaRiconnessione(){
    setTimeout(function(){
        radio.src = "http://sr10.inmystream.it:8227/stream";
        radio.load();
        radio.play().then(() => {
            playBtn.innerHTML = "STOP";
            statusText.innerHTML = "Online";
            isPlaying = true;
        }).catch(function(){
            statusText.innerHTML = "Riconnessione...";
            tentaRiconnessione();
        });
    }, 5000);
}

/* CONTATORE SINCRONIZZATO - uguale per tutti basato sull'orario */

// 25 numeri base tra 800 e 2000
const baseListeners = [
    1252, 1487, 1343, 1561, 1724,
    1538, 1783, 1592, 1817, 1643,
    1895, 1672, 1947, 1763, 1821,
    1594, 1436, 1258, 1063, 1341,
    1127, 983, 1154, 927, 1046
];

function getSyncedListeners() {
    const now = new Date();
    
    // Numero base cambia ogni 40 minuti
    const slot40 = Math.floor((now.getHours() * 60 + now.getMinutes()) / 40);
    const baseIndex = slot40 % baseListeners.length;
    const base = baseListeners[baseIndex];
    
    // Lista variazioni predefinite (ogni 5 minuti)
    const variazioni = [0, +15,-3, +28, +2, +10, +6, -12, -20, +1, -8, +18, +4, +5, -15, +1, +3, +22, -10, +2];
    const slotMinuti = Math.floor(now.getMinutes() / 3) % variazioni.length;
    
    return base + variazioni[slotMinuti];
}

function updateListeners() {
    const count = getSyncedListeners();
    document.getElementById("listenerCount").innerHTML = count;
}

updateListeners();

// Aggiorna ogni 90 secondi
setInterval(updateListeners, 90000);

    /* CONTROLLO SILENZIO STREAM */

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

const source = audioContext.createMediaElementSource(radio);

const analyser = audioContext.createAnalyser();

source.connect(analyser);
analyser.connect(audioContext.destination);

analyser.fftSize = 256;

const dataArray = new Uint8Array(analyser.frequencyBinCount);

let silenceStart = null;

function checkSilence(){

    if(!isPlaying) return;

    analyser.getByteFrequencyData(dataArray);

    let sum = 0;

    for(let i = 0; i < dataArray.length; i++){
        sum += dataArray[i];
    }

    let average = sum / dataArray.length;

    /* soglia silenzio */

    if(average < 3){

        if(!silenceStart){
            silenceStart = Date.now();
        }

        /* 20 secondi di silenzio */

        if(Date.now() - silenceStart > 20000){

            statusText.innerHTML = "Riconnessione...";

            radio.pause();

            radio.load();

            radio.play();

            silenceStart = null;
        }

    }else{

        silenceStart = null;
    }
}

/* controllo ogni 3 secondi */

setInterval(checkSilence, 3000);

</script>

</body>
</html>
