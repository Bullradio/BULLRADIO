<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BULL RADIO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    font-family:'Poppins',sans-serif;
    color:white;
    overflow:hidden;
}

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#ff003c 0%,transparent 40%),
    radial-gradient(circle at bottom,#0044ff 0%,transparent 40%),
    #0f0f0f;
    animation:bgmove 8s infinite alternate;
}

@keyframes bgmove{
    from{
        filter:hue-rotate(0deg);
    }
    to{
        filter:hue-rotate(40deg);
    }
}

.container{
    position:fixed;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100%;
    width:100%;
    padding:20px;
    text-align:center;
    overflow:hidden;
}
.logo{
    width:140px;
    height:140px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,255,255,0.25);
    opacity:0.75;
}

h1{
    margin-top:10px;
    font-size:26px;
    font-weight:600;
}

.subtitle{
    margin-top:6px;
    opacity:0.8;
    font-size:14px;
}

.socialname{
    margin-top:8px;
    font-size:11px;
    opacity:0.7;
    background:rgba(255,255,255,0.08);
    padding:6px 12px;
    border-radius:12px;
}

.player{
    margin-top:20px;
}

.play-btn{
    width:75px;
    height:75px;
    border:none;
    border-radius:50%;
    background:#ff003c;
    color:white;
    font-size:18px;
    font-weight:600;
    box-shadow:0 0 20px rgba(255,0,60,0.5);
}

.play-btn:active{
    transform:scale(0.95);
}

.status{
    margin-top:10px;
    font-size:14px;
    opacity:0.8;
}

.visualizer{
    display:flex;
    gap:6px;
    margin-top:15px;
    height:25px;
    align-items:flex-end;
}

.bar{
    width:6px;
    background:white;
    border-radius:10px;
    animation:bounce 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:0.1s;}
.bar:nth-child(3){animation-delay:0.2s;}
.bar:nth-child(4){animation-delay:0.3s;}
.bar:nth-child(5){animation-delay:0.4s;}

@keyframes bounce{
    0%,100%{
        height:4px;
        opacity:0.3;
    }
    50%{
        height:25px;
        opacity:1;
    }
}

.social{
    margin-top:15px;
}

.social a{
    text-decoration:none;
    color:white;
    background:#1f1f1f;
    padding:10px 16px;
    border-radius:12px;
    font-size:13px;
}

.listeners{
    position:absolute;
    bottom:35px;
    font-size:9px;
    opacity:0.48;
    letter-spacing:1px;
}

.footer{
    position:absolute;
    bottom:15px;
    font-size:11px;
    opacity:0.5;
}


</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<img src="logo24.png" class="logo">

<h1>BULL RADIO</h1>

<div class="subtitle">
LA RADIO SEMPRE IN LINEA
</div>

<div class="socialname">
WWW.BULLRADIO.NET
</div>

<div class="player">

<button class="play-btn" onclick="toggleRadio()" id="playBtn">
PLAY
</button>

<div class="status" id="status">
Premi PLAY
</div>

</div>

<div class="visualizer">
<div class="bar"></div>

</div>
<div class="listeners">
ONLINE: <span id="listenerCount">...</span>
</div>
<div class="social">

<a href="https://www.facebook.com/Thebull.italia/" target="_blank">
Facebook
</a>

</div>



<div class="footer">
Created by Secchi Mauro
</div>

<audio id="radio" preload="none">

<source src="http://sr10.inmystream.it:8227/stream" type="audio/mpeg">

</audio>

</div>

<script>

const radio = document.getElementById("radio");
const playBtn = document.getElementById("playBtn");
const statusText = document.getElementById("status");

let isPlaying = false;

function toggleRadio(){

    if(!isPlaying){

        radio.play().then(() => {

            playBtn.innerHTML = "STOP";
            statusText.innerHTML = "Online";

            isPlaying = true;

        }).catch(function(){

            statusText.innerHTML = "Errore Stream";

        });

    }else{

        radio.pause();

        playBtn.innerHTML = "PLAY";
        statusText.innerHTML = "PAUSA";

        isPlaying = false;
    }
}

radio.onplaying = function(){
    statusText.innerHTML = "Online";
}

radio.onerror = function(){
    statusText.innerHTML = "Errore Stream";
}

/* CONTATORE SINCRONIZZATO - uguale per tutti basato sull'orario */

// 25 numeri base tra 800 e 2000
const baseListeners = [
    1250, 1480, 1720, 980, 1560,
    1890, 1340, 1670, 840, 1120,
    1950, 1430, 1780, 1060, 1590,
    920, 1820, 1380, 1640, 870,
    1990, 1150, 1530, 1760, 1040
];

function getSyncedListeners() {
    const now = new Date();
    // Cambia numero base ogni 40 minuti
    const slot40 = Math.floor((now.getHours() * 60 + now.getMinutes()) / 40);
    const baseIndex = slot40 % baseListeners.length;
    const base = baseListeners[baseIndex];

    // Piccolo incremento/decremento basato sui secondi (uguale per tutti)
    const seconds = now.getSeconds();
    const micro = Math.floor(seconds / 10) * 7;
    const direction = (Math.floor(now.getMinutes() / 5) % 2 === 0) ? 1 : -1;

    return base + (micro * direction);
}

function updateListeners() {
    const count = getSyncedListeners();
    document.getElementById("listenerCount").innerHTML = count;
}

updateListeners();

// Aggiorna ogni 90 secondi
setInterval(updateListeners, 90000);

</script>

</body>
</html>
