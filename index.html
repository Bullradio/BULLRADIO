<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BULL RADIO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    font-family:'Poppins',sans-serif;
    color:white;
    overflow:hidden;
}

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#ff003c 0%,transparent 40%),
    radial-gradient(circle at bottom,#0044ff 0%,transparent 40%),
    #0f0f0f;
    animation:bgmove 8s infinite alternate;
}

@keyframes bgmove{
    from{
        filter:hue-rotate(0deg);
    }
    to{
        filter:hue-rotate(40deg);
    }
}

.container{
    position:relative;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    padding:20px;
    text-align:center;
}

.logo{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:30px;
    box-shadow:0 0 30px rgba(255,255,255,0.25);
    animation:pulse 3s infinite;
    opacity:0.75;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.03);
    }
    100%{
        transform:scale(1);
    }
}

h1{
    margin-top:25px;
    font-size:38px;
    font-weight:600;
}

.subtitle{
    margin-top:10px;
    opacity:0.8;
    font-size:18px;
}

.socialname{
    margin-top:12px;
    font-size:13px;
    opacity:0.7;
    background:rgba(255,255,255,0.08);
    padding:8px 14px;
    border-radius:12px;
}

.player{
    margin-top:35px;
}

.play-btn{
    width:90px;
    height:90px;
    border:none;
    border-radius:50%;
    background:#ff003c;
    color:white;
    font-size:22px;
    font-weight:600;
    box-shadow:0 0 20px rgba(255,0,60,0.5);
}

.play-btn:active{
    transform:scale(0.95);
}

.status{
    margin-top:18px;
    font-size:16px;
    opacity:0.8;
}

.visualizer{
    display:flex;
    gap:6px;
    margin-top:30px;
    height:50px;
    align-items:flex-end;
}

.bar{
    width:8px;
    background:white;
    border-radius:10px;
    animation:bounce 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:0.1s;}
.bar:nth-child(3){animation-delay:0.2s;}
.bar:nth-child(4){animation-delay:0.3s;}
.bar:nth-child(5){animation-delay:0.4s;}

@keyframes bounce{
    0%,100%{
        height:10px;
        opacity:0.3;
    }
    50%{
        height:50px;
        opacity:1;
    }
}

.social{
    margin-top:40px;
}

.social a{
    text-decoration:none;
    color:white;
    background:#1f1f1f;
    padding:12px 18px;
    border-radius:12px;
    font-size:14px;
}

.listeners{
    position:absolute;
    bottom:45px;
    font-size:9px;
    opacity:0.48;
    letter-spacing:1px;
}

.footer{
    position:absolute;
    bottom:20px;
    font-size:12px;
    opacity:0.5;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<img src="logo24.png" class="logo">

<h1>BULL RADIO</h1>

<div class="subtitle">
LA RADIO SEMPRE IN LINEA
</div>

<div class="socialname">
WWW.BULLRADIO.NET
</div>

<div class="player">

<button class="play-btn" onclick="toggleRadio()" id="playBtn">
PLAY
</button>

<div class="status" id="status">
Premi PLAY
</div>

</div>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="social">

<a href="https://www.facebook.com/Thebull.italia/" target="_blank">
Facebook
</a>

</div>

<div class="listeners">
ONLINE: <span id="listenerCount">1472</span>
</div>

<div class="footer">
Created by Secchi Mauro
</div>

<audio id="radio" preload="none">

<source src="http://sr10.inmystream.it:8227/stream" type="audio/mpeg">

</audio>

</div>

<script>

const radio = document.getElementById("radio");
const playBtn = document.getElementById("playBtn");
const statusText = document.getElementById("status");

let isPlaying = false;

function toggleRadio(){

    if(!isPlaying){

        radio.play().then(() => {

            playBtn.innerHTML = "STOP";
            statusText.innerHTML = "Online";

            isPlaying = true;

        }).catch(function(){

            statusText.innerHTML = "Errore Stream";

        });

    }else{

        radio.pause();

        playBtn.innerHTML = "PLAY";
        statusText.innerHTML = "PAUSA";

        isPlaying = false;
    }
}

radio.onplaying = function(){
    statusText.innerHTML = "Online";
}

radio.onerror = function(){
    statusText.innerHTML = "Errore Stream";
}

/* CONTATORE REALISTICO */

let baseListeners = Math.floor(Math.random() * 4200) + 600;

let listeners = baseListeners;

document.getElementById("listenerCount").innerHTML = listeners;

/* PICCOLE VARIAZIONI OGNI 2 MINUTI E MEZZO */

setInterval(() => {

    let change = Math.floor(Math.random() * 18);

    if(Math.random() > 0.5){
        listeners += change;
    }else{
        listeners -= change;
    }

    if(listeners < baseListeners - 80){
        listeners = baseListeners - 80;
    }

    if(listeners > baseListeners + 80){
        listeners = baseListeners + 80;
    }

    document.getElementById("listenerCount").innerHTML = listeners;

}, 150000);

/* NUOVO NUMERO BASE OGNI 70 MINUTI */

setInterval(() => {

    baseListeners = Math.floor(Math.random() * 4200) + 600;

}, 4200000);

</script>
